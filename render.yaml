services:
  - type: web
    name: anonymous-chat-api
    runtime: node
    buildCommand: npm install && npm run build && npm run migration:run
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chatdb
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: chat-redis
          type: keyvalue
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

databases:
  - name: chatdb
    plan: free
    databaseName: chatdb
    user: postgres

keyValueStores:
  - name: chat-redis
    plan: free
